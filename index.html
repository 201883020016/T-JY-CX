<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>传讯</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部菜单栏 -->
    <header id="top-menu">
        <div id="user-profile-btn" class="profile-area">
            <img id="user-avatar-img" src="" alt="头像">
            <span id="user-name-display"></span>
        </div>
        <button id="feature-menu-btn" class="menu-btn">功能</button>
        <button id="clear-data-btn" class="menu-btn danger">清空</button>
    </header>

    <!-- 功能菜单抽屉 (严格按指令：只留三个功能按钮) -->
    <div id="feature-drawer" class="drawer-panel">
        <div class="drawer-header">
            <h3>功能菜单</h3>
            <button id="close-feature-drawer-btn">关闭</button>
        </div>
        <div class="drawer-body">
            <button id="reply-manager-menu-btn" class="drawer-item-btn">编辑回复</button>
            <button id="chat-settings-menu-btn" class="drawer-item-btn">聊天设置</button>
            <button id="backup-menu-btn" class="drawer-item-btn">数据备份</button>
        </div>
    </div>

    <!-- 数据备份模态框 (新增的一级菜单) -->
  <div id="backup-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>数据备份</h3>
            <div class="drawer-body" style="padding: 0; margin-top: 15px;">
                <button id="import-reply-btn" class="drawer-item-btn">导入回复库</button>
                <button id="export-reply-btn" class="drawer-item-btn">导出回复库</button>
                <button id="import-chat-btn" class="drawer-item-btn">导入记录</button>
                <button id="export-chat-btn" class="drawer-item-btn">导出记录</button>
            </div>
            <div class="modal-actions" style="margin-top: 15px;">
                <button id="close-backup-btn">返回</button> <!-- 这里修改为返回 -->
            </div>
        </div>
    </div>

    <!-- 角色资料模态框 -->
    <div id="profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>编辑资料</h3>
            <div class="avatar-edit-area">
                <img id="edit-avatar-preview" src="">
                <button id="change-avatar-btn">更换头像</button>
                <input type="file" id="avatar-uploader" accept="image/*" style="display:none">
            </div>
            <!-- 严格修改为名字 -->
            <input type="text" id="edit-profile-name" placeholder="输入姓名 (留空默认名字)">
            <div class="modal-actions">
                <button id="cancel-profile-btn">取消</button>
                <button id="save-profile-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- 聊天设置模态框 -->
    <div id="settings-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>聊天设置</h3>
            <div class="setting-item">
                <label>最短回复时间 (分钟):</label>
                <input type="number" id="min-delay-input" min="2" max="720">
            </div>
            <div class="setting-item">
                <label>最长回复时间 (分钟):</label>
                <input type="number" id="max-delay-input" min="2" max="720">
            </div>
            <div class="setting-item" style="margin-top: 10px;">
                <label>气泡字号: <span id="font-size-display" style="font-weight: bold;"></span></label>
                <input type="range" id="font-size-slider" min="1" max="5" step="1">
            </div>
            <div class="modal-actions">
                <button id="cancel-settings-btn">取消</button>
                <button id="save-settings-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- 主容器 -->
    <div id="threads-container"></div>

    <!-- 翻页控制器 -->
    <div id="pagination-controls">
        <button id="prev-page-btn">上一页</button>
        <span id="page-info"></span>
        <button id="next-page-btn">下一页</button>
    </div>

    <!-- 底部输入区 -->
    <div id="input-area">
        <textarea id="message-input" placeholder="发起一个新话题..." rows="1"></textarea>
        <button id="send-btn">发送</button>
    </div>

    <!-- 回复库管理面板 (完全保留你原版的Tabs标签页，绝不拆散) -->
    <div id="reply-panel">
        <div class="panel-header">
            <h3>编辑回复</h3>
            <div class="panel-header-actions">
                <button id="close-panel-btn">返回</button> <!-- 这里修改为返回 -->
            </div>
        </div>
        <div class="panel-body">
            <div class="tabs">
                <button class="tab-btn active" data-tab="zika">字卡</button>
                <button class="tab-btn" data-tab="emoji">Emoji</button>
                <button class="tab-btn" data-tab="image">图片</button>
            </div>
            
            <div id="zika-tab-content" class="tab-content active">
                <div id="add-zika-form-container" class="add-form-container">
                    <div class="add-reply-section">
                        <input type="text" id="new-zika-category" list="category-list" placeholder="输入或选择分组 (可不填)">
                        <textarea id="new-zika-content" placeholder="输入字卡内容..." rows="3"></textarea>
                        <button id="add-zika-btn">确认新增</button>
                    </div>
                </div>

                <div id="zika-filter-bar" class="toolbar">
                    <select id="zika-group-filter"></select>
                    <button id="show-add-zika-form-btn" class="icon-btn">+</button>
                </div>
                <input type="text" id="zika-search" class="toolbar-search" placeholder="在当前组内检索...">
                <div id="reply-list-zika" class="reply-list"></div>
            </div>

            <div id="emoji-tab-content" class="tab-content"> <div class="toolbar"> <input type="text" id="new-emoji-content" placeholder="在此输入要添加的 Emoji"> <button id="add-emoji-btn" class="inline-add-btn">添加</button> </div> <div id="reply-list-emoji" class="reply-list emoji-list"></div> </div>
            <div id="image-tab-content" class="tab-content"> <div id="reply-list-image" class="reply-list image-list"></div> <button id="add-reply-image-btn" class="add-file-btn">添加图片</button> </div>
        </div>
    </div>
    
    <!-- 编辑字卡模态框 -->
    <div id="edit-modal" class="modal-overlay" style="display: none;"> <div class="modal-content"> <h3>编辑字卡</h3> <input type="text" id="edit-zika-category" list="category-list" placeholder="分组 (可不填)"> <textarea id="edit-zika-content" rows="4"></textarea> <div class="modal-actions"> <button id="cancel-edit-btn">取消</button> <button id="save-edit-btn">保存</button> </div> </div> </div>

    <!-- 清空确认模态框 -->
    <div id="confirm-clear-modal" class="modal-overlay" style="display: none;"> <div class="modal-content"> <h3>确认清空</h3> <p>此操作不可逆，将删除所有话题记录，但<span style="font-weight: bold;">保留回复库</span>。请输入 <kbd>delete</kbd> 以确认。</p> <input type="text" id="confirm-clear-input" autocomplete="off"> <div class="modal-actions"> <button id="cancel-clear-btn">取消</button> <button id="confirm-clear-action-btn" disabled>确认清空</button> </div> </div> </div>

    <!-- 公共组件 -->
    <datalist id="category-list"></datalist>
    <input type="file" id="file-importer" style="display: none;" />
    <input type="file" id="image-uploader" style="display: none;" accept="image/*" multiple />

    <script src="message.js"></script>
</body>
</html>
